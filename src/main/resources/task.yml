tasks:
  global_1:  # 任务标识符
    display: # 用于任务菜单显示
      material: "DIAMOND_SWORD"
      custom_data: 0
    name: "§a累计任务: 公会战斗" # 任务名称
    type: "global" # global:全局任务, daily:每日任务
    event:
      type: "kill_mobs" # 任务事件
      target: "zombie" # 任务目标
      amount: 100 # 任务目标数量
    lore: # 任务描述
      - "§7描述: 公会全体成员累计击杀100个僵尸"
      - "§7奖励: §e80经验 §7100金币"
    actions: # 任务完成后执行的指令动作,可以调用该插件内菜单组件的方法
      - "console: money give %player_name% 100"
      - "console: kg admin exp %kaguilds_id% add 80"
  daily_1:  # 任务标识符
    display:
      material: "DIAMOND_SWORD"
      custom_data: 0
    name: "§a每日任务: 上线" # 任务名称
    type: "daily" # global:全局任务, daily:每日任务
    event:
      type: "login" # 任务事件
      target: "*" # 任务目标(*代表无需目标或任意目标)
      amount: 1 # 任务目标数量
    lore: # 任务描述
      - "§7描述: 每日上线游玩服务器"
      - "§7奖励: §e10经验 "
    actions: # 任务完成后执行的指令动作,可以调用该插件内菜单组件的方法
      - "console: kg admin exp %kaguilds_id% add 10"

  # 钓鱼任务示例
  fishing_daily:
    name: "§a每日任务: 渔夫"
    type: "daily"
    event:
      type: "fishing"
      target: "*"
      amount: 10
    lore:
      - "§7描述: 每日钓鱼10次"
      - "§7奖励: §e20经验"
    actions:
      - "console: kg admin exp %kaguilds_id% add 20"

  # 挤奶任务示例
  milk_daily:
    name: "§a每日任务: 牧场主"
    type: "daily"
    event:
      type: "milk"
      target: "cow"
      amount: 5
    lore:
      - "§7描述: 每日给奶牛挤奶5次"
      - "§7奖励: §e15经验"
    actions:
      - "console: kg admin exp %kaguilds_id% add 15"

  # 剪羊毛任务示例
  shear_daily:
    name: "§a每日任务: 理发师"
    type: "daily"
    event:
      type: "shear"
      target: "sheep"
      amount: 10
    lore:
      - "§7描述: 每日剪羊毛10次"
      - "§7奖励: §e15经验"
    actions:
      - "console: kg admin exp %kaguilds_id% add 15"

  # 村民交易任务示例
  trade_global:
    name: "§a累计任务: 商人"
    type: "global"
    event:
      type: "trade"
      target: "*"
      amount: 100
    lore:
      - "§7描述: &7通过与村民交易获得 &f64 &7个绿宝石"
      - "§7奖励: §e100经验"
    actions:
      - "console: kg admin exp %kaguilds_id% add 100"

  # 食用食物任务示例
  eat_daily:
    name: "§a每日任务: 美食家"
    type: "daily"
    event:
      type: "eat_food"
      target: "cooked_beef"
      amount: 5
    lore:
      - "§7描述: 每日食用牛排5次"
      - "§7奖励: §e10经验"
    actions:
      - "console: kg admin exp %kaguilds_id% add 10"

  # 催化农作物任务示例
  bonemeal_daily:
    name: "§a每日任务: 农夫"
    type: "daily"
    event:
      type: "bonemeal"
      target: "wheat"
      amount: 20
    lore:
      - "§7描述: 每日用骨粉催化小麦20次"
      - "§7奖励: §e20经验"
    actions:
      - "console: kg admin exp %kaguilds_id% add 20"

  # 熔炼金属锭任务示例
  smelt_iron_global:
    name: "§a累计任务: 铁匠"
    type: "global"
    event:
      type: "smelt"
      target: "iron_ingot"
      amount: 64
    lore:
      - "§7描述: 公会成员累计熔炼64个铁锭"
      - "§7奖励: §e80经验"
    actions:
      - "console: kg admin exp %kaguilds_id% add 80"

  # 公会捐赠任务示例（按金额累计）
  donate_global:
    name: "§a累计任务: 慷慨之心"
    type: "global"
    event:
      type: "donate"
      target: "*"
      amount: 1000
    lore:
      - "§7描述: 公会成员累计捐赠1000金币"
      - "§7奖励: §e100经验"
    actions:
      - "console: kg admin exp %kaguilds_id% add 100"

  # 每日捐赠任务
  donate_daily:
    name: "§a每日任务: 小额捐赠"
    type: "daily"
    event:
      type: "donate"
      target: "*"
      amount: 100
    lore:
      - "§7描述: 每日捐赠100金币给公会"
      - "§7奖励: §e20经验"
    actions:
      - "console: kg admin exp %kaguilds_id% add 20"