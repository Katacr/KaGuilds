tasks:
  global_1:  # 任务标识符
    name: "§a累计任务: 公会战斗" # 任务名称
    type: "global" # global:全局任务, daily:每日任务
    event:
      type: "kill_mobs" # 任务事件
      target: "zombie" # 任务目标
      amount: 100 # 任务目标数量
    lore: # 任务描述
      - "§7描述: 公会全体成员累计击杀100个僵尸"
      - "§7奖励: §e80经验 §7100金币"
    actions: # 任务完成后执行的指令动作,可以调用该插件内菜单组件的方法
      - "console: movey give %player_name% 100"
      - "console: kg admin exp %kaguilds_id% add 80"
  daily_1:  # 任务标识符
    name: "§a每日任务: 上线" # 任务名称
    type: "daily" # global:全局任务, daily:每日任务
    event:
      type: "login" # 任务事件
      target: "*" # 任务目标(*代表无需目标或任意目标)
      amount: 1 # 任务目标数量
    lore: # 任务描述
      - "§7描述: 每日上线游玩服务器"
      - "§7奖励: §e10经验 "
    actions: # 任务完成后执行的指令动作,可以调用该插件内菜单组件的方法
      - "console: kg admin exp %kaguilds_id% add 10"

  # 钓鱼任务示例
  fishing_daily:
