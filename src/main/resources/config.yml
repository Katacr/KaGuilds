# ========================================
# KaGuilds 配置文件
# ========================================
# 基础设置
# ========================================

# 插件语言设置
# 可选值: zh_CN (简体中文), en_US (English)
# 注意: 修改语言后需要重载插件才能生效
language: zh_CN

# ========================================
# 代理模式设置 (Velocity/BungeeCord)
# ========================================

# 是否启用代理模式
# true: 启用跨服功能，使用 MySQL 数据库
# false: 单服务器模式，可使用 SQLite 或 MySQL
proxy: false

# 服务器唯一标识符
# 作用: 在跨服环境中区分不同的服务器
# 注意: 同一网络中的每个服务器必须有唯一的 server-id
# 示例: "survival", "creative", "lobby", "minigames"
server-id: server

# ========================================
# 日期格式设置
# ========================================

# 日期时间格式化字符串
# 用于显示公会创建时间、任务重置时间等
# 格式说明:
#   yyyy - 年份 (4位)
#   MM   - 月份 (01-12)
#   dd   - 日期 (01-31)
#   HH   - 小时 (00-23)
#   mm   - 分钟 (00-59)
#   ss   - 秒 (00-59)
# 示例: "yyyy-MM-dd HH:mm:ss" → "2024-01-15 10:30:00"
date-format: "yyyy-MM-dd HH:mm:ss"

# ========================================
# 公会设置
# ========================================
guild:
  # 公会名称设置
  name-settings:
    # 公会名称最小长度
    min-length: 3
    
    # 公会名称最大长度
    max-length: 16
    
    # 公会名称正则表达式验证规则
    # 限制允许的字符类型，防止使用特殊字符
    # \u4e00-\u9fa5 - 汉字范围
    # a-zA-Z      - 英文字母
    # 0-9         - 数字
    # 注意: 修改此规则前请确保了解正则表达式语法
    regex: "^[\\u4e00-\\u9fa5a-zA-Z0-9]+$"
  
  # 公会默认公告 (MOTD - Message of the Day)
  # 创建新公会时使用的默认公告文本
  # 支持颜色代码: &a - 绿色, &b - 青色, &c - 红色, &d - 紫色, &e - 黄色, &f - 白色
  motd: "欢迎加入我的公会"
  
  # 公会默认图标
  # 创建新公会时使用的默认图标材质
  # 可选值: 任何 Minecraft 物品材质 (如: SHIELD, DIAMOND, GOLD_BLOCK)
  # 建议: 使用具有辨识度的物品作为图标
  icon: "SHIELD"
  
  # 公会聊天格式
  # 定义公会聊天消息的显示格式
  # 可用变量:
  #   {role}       - 玩家职位 (会长/管理员/成员)
  #   {player}     - 玩家名称
  #   {player_level} - 玩家等级 (需配合等级插件)
  #   {message}    - 聊天消息内容
  # 注意: 如果使用 PlaceholderAPI，可以使用 %vault_prefix% 等变量
  chat-format: "&7[&e公会聊天&7] &f{role} &f%vault_prefix% &6{player}&f: {message}"
  
  # 公会传送设置
  teleport:
    # 禁止设置传送点的世界列表
    # 在这些世界中无法设置公会传送点
    # 常见: "world_nether" (下界), "world_the_end" (末地)
    # 用途: 防止玩家在危险维度设置传送点
    disabled-worlds:
      - "world_nether"
      - "world_the_end"
    
    # 传送前的等待时间 (秒)
    # 玩家点击传送后需要等待的时间
    # 建议: 3-10 秒，防止误操作
    # 注意: 传送过程中如果移动会被取消
    cooldown: 3
  
  # 公会战 (Arena) 设置
  arena:
    # 公会战冷却时间 (秒)
    # 两次公会战之间的最小间隔
    # 建议: 300 (5分钟) - 1800 (30分钟)
    cooldown: 300
    
    # 单方队伍最小人数
    # 低于此人数无法开始公会战
    # 建议: 2-5 人
    min-players: 2
    
    # 单方队伍最大人数
    # 每个公会最多有多少人可以参与公会战
    # 建议: 5-10 人
    max-players: 5
    
    # 公会战准备时间 (秒)
    # 战斗开始前的准备阶段
    # 建议: 30-60 秒
    ready-time: 30
    
    # 公会战持续时间 (秒)
    # 从战斗开始到结束的时间
    # 建议: 300 (5分钟) - 1800 (30分钟)
    pvp-time: 600
    
    # 是否启用预设套装 (Kit)
    # true: 参与玩家会获得统一装备
    # false: 玩家使用自己的装备
    # 注意: 预设套装需要在游戏中配置
    kit: true
    
    # 公会战奖励命令
    # 战斗结束后由控制台执行的命令
    # 可用变量:
    #   {win_id}  - 胜利公会的 ID
    #   {lose_id} - 战败公会的 ID
    # 命令示例:
    #   - kg admin bank {win_id} add 1000  # 给胜利公会添加金币
    #   - kg admin exp {win_id} add 500   # 给胜利公会添加经验
    reward-command:
      - 'kg admin bank {win_id} add 1000'  # 胜利公会金币奖励
      - 'kg admin exp {win_id} add 500'   # 胜利公会经验奖励
      - 'kg admin bank {lose_id} add 100'  # 战败公会金币奖励
      - 'kg admin exp {lose_id} add 50'    # 战败公会经验奖励

# ========================================
# 数据库设置
# ========================================
database:
  # 数据库类型
  # SQLite: 本地文件数据库，无需额外配置，适合小型服务器
  # MySQL: 远程数据库，适合多服务器或大型服务器
  # 注意: 启用代理模式 (proxy: true) 时必须使用 MySQL
  type: "SQLite"
  
  # MySQL 数据库配置 (仅在 type: MySQL 时生效)
  # ==================================================
  
  # 数据库服务器地址
  # 本地: "localhost" 或 "127.0.0.1"
  # 远程: 服务器的 IP 地址或域名
  host: "localhost"
  
  # 数据库端口
  # MySQL 默认端口: 3306
  # 注意: 确保防火墙已开放此端口
  port: 3306
  
  # 数据库名称
  # KaGuilds 使用的数据库名称
  # 建议: 使用单独的数据库，如 "kaguilds"
  db: "kaguilds"
  
  # 数据库用户名
  # 需要有创建表、插入、更新、删除权限的账户
  # 警告: 不要使用 root 账户，建议创建专用账户
  user: "root"
  
  # 数据库密码
  # 警告: 请使用强密码，保护数据库安全
  password: "password"

# ========================================
# 经济系统设置
# ========================================
# 注意: 需要安装 Vault 插件和前置经济插件 (如 EssentialsX)

balance:
  # 创建公会所需的金币数量
  # 玩家创建新公会时需要支付的金额
  # 建议: 根据服务器经济水平调整，通常为 5000-20000
  create: 10000.0
  
  # 公会改名所需的金币数量
  # 会长修改公会名称时需要支付的金额
  # 建议: 为创建费用的 20%-50%
  rename: 3000.0
  
  # 设置公会传送点所需的金币数量
  # 会长或管理员设置传送点时需要支付的金额
  # 建议: 500-2000
  settp: 1000.0
  
  # 设置公会图标所需的金币数量
  # 修改公会图标材质时需要支付的金额
  # 建议: 500-2000
  seticon: 1000.0
  
  # 设置公会公告所需的金币数量
  # 修改公会公告文本时需要支付的金额
  # 建议: 较低，鼓励活跃，如 50-200
  setmotd: 100.0
  
  # 发起公会战所需的金币数量
  # 向其他公会发起公会战挑战时需要支付的金额
  # 建议: 200-500
  pvp: 300.0

# ========================================
# 任务系统设置
# ========================================
task:
  # 每日任务 BossBar 显示
  # 玩家完成每日任务获得进展时是否显示 BossBar
  # true: 显示进度条和任务描述
  # false: 不显示
  daily_boss_bar: true
  
  # 全局任务 BossBar 显示
  # 公会成员完成全局任务获得进展时是否显示 BossBar
  # true: 所有公会成员看到进度
  # false: 不显示
  global_boss_bar: true
  
  # 每日任务重置时间
  # 格式: HH:mm:ss (24小时制)
  # 每天的这个时间，所有每日任务会重置
  # 常见设置:
  #   "00:00:00" - 凌晨0点
  #   "06:00:00" - 早上6点
  #   "12:00:00" - 中午12点
  # 注意: 重置时间后，玩家可以重新完成任务
  reset_time: "00:00:00"

# ========================================
# 贡献度系统设置
# ========================================
# 贡献度系统奖励玩家对公会的经济贡献

contribution:
  # 是否启用贡献度系统
  # true: 启用，玩家存入/取出金币时会影响贡献度
  # false: 禁用，不追踪贡献度
  enabled: true
  
  # 存入金币时的贡献度获得比例
  # 每存入 1 金币获得的贡献度点数
  # 示例: 1.0 表示存入 100 金币获得 100 贡献度
  # 建议: 0.5-2.0，根据服务器经济平衡调整
  bank-deposit-ratio: 1.0
  
  # 取出金币时的贡献度扣除比例
  # 每取出 1 金币扣除的贡献度点数
  # 示例: 1.0 表示取出 100 金币扣除 100 贡献度
  # 注意: 贡献度不足时无法取出金币
  # 建议: 通常与存入比例相同，或略高以惩罚过度取出
  bank-withdraw-ratio: 1.0

# ========================================
# 配置文件结束
# ========================================
# 修改配置后，请使用 /kg reload 重载插件
# 如需帮助，请查看插件文档或联系支持
# ========================================


