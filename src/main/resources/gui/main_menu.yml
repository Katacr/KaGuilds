title: "公会菜单"  # 标题

Layout:   # 虚拟布局
  - '#########'
  - '   i m   '
  - '         '
  - '  12345  '
  - '  67890  '
  - 'B########'

button:
  "#":
    display:
      material: GRAY_STAINED_GLASS_PANE
      name: '边框板'
  "i":
    display:
      material: FIREWORK_ROCKET
      name: '&a公会信息'
      lore:
        - '&b名称: &3{name}'
        - '&bID: &3#{id}'
        - '&b创建时间: &3{create_time}'
        - '&b会长: &3{owner}'
        - '&b等级: &3Lv. {level}'
        - '&b成员: &3{members}/{max_members}'
        - '&b银行: &3{balance}金币'
  "m":
    display:
      material: OAK_SIGN
      name: '&a公会公告'
      lore:
        - '&3{announcement}'

  "1":
    display:
      material: LECTERN
      name: '&a公会管理'
      lore:
        - '&b管理公会的相关事务，'
        - '&b仅限会长/管理员可用'
        - '&e点击进入'
    actions:
      left:
        - condition: "%kaguilds_is_staff% >= true"
          actions:
            - 'open: guild_manage'
          deny:
            - 'tell: &c✗ 该功能仅限会长/管理员可用'
  "2":
    display:
      material: OAK_SIGN
      name: '&a公会列表'
      lore:
        - '&b查看服务器全部公会列表'
        - '&e点击进入'
    actions:
      left:
        - 'open: guilds_list'
  "3":
    display:
      material: IRON_BOOTS
      name: '&a公会成员列表'
      lore:
        - '&b查看当前公会的成员列表'
        - '&e点击进入'
    actions:
      left:
        - 'open: guild_members'
  "4":
    display:
      material: HONEY_BOTTLE
      name: '&a公会BUFF商店'
      lore:
        - '&b进入公会的BUFF购买页面'
        - '&e点击进入'
    actions:
      left:
        - 'open: guild_buffs'
  "5":
    display:
      material: CHEST
      name: '&a公会金库'
      lore:
        - '&b进入公会的共享云存储页面'
        - '&e点击进入'
    actions:
      left:
        - 'open: guild_vaults'
  "6":
    display:
      material: EMERALD
      name: '&a公会银行'
      lore:
        - '&b进入公会银行'
        - '&e点击进入'
    actions:
      left:
        - 'open: guild_bank'
  "7":
    display:
      material: DIAMOND
      name: '&a公会升级'
      lore:
        - '&b进入查看公会的等级详情'
        - '&e点击进入'
    actions:
      left:
        - 'open: guild_upgrade'
  "8":
    display:
      material: ENCHANTED_BOOK
      name: '&a公会全体任务'
      lore:
        - '&b进入查看公会的全体任务'
        - '&e点击进入'
    actions:
      left:
        - 'open: guild_global_task'
  "9":
    display:
      material: BOOK
      name: '&a公会个人任务'
      lore:
        - '&b进入查看公会的个人任务'
        - '&e点击进入'
    actions:
      left:
        - 'open: guild_daily_task'