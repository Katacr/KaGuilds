title: "&0Guild Vault"

layout:
  - '#########'
  - '111111111'
  - 'B########'

button:
  "#":
    display:
      material: GRAY_STAINED_GLASS_PANE
      name: ' '

  "1":
    type: 'GUILD_VAULTS'
    display:
      name: '&6&lVault #{vault_num}'
      lore:
        - '&7This is guild shared storage space'
        - ''
        - '&fStatus: {vault_status}'
        - ''
        - '&e[Left Click] &aOpen Storage'
    actions:
      left:
        - 'command: kg vault {vault_num}'
        - 'sound: block.chest.open'
        - 'close'



  "B":
    display:
      material: RED_STAINED_GLASS_PANE
      name: '&cBack to Main Menu'
    actions:
      left:
        - 'open: main_menu'
