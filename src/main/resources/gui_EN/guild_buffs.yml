title: "&0Guild BUFF Shop"  # Title (supports colors)

Layout:   # Menu layout (6 rows)
  - '#########'
  - '111111111'
  - '111111111'
  - '111111111'
  - '111111111'
  - 'B######<>'

button:
  "#":
    display:
      material: GRAY_STAINED_GLASS_PANE
      name: ' '

  "1":
    type: 'BUFF_LIST'
    display:
      material: {buff_item}  # Honey bottle/Glass bottle
      name: '&a{buff_name} ' # Buff name
      lore:
        - '&7--------------------------'
        - '&bPrice: {buff_price}'  # Price
        - '&bDuration: {buff_time} seconds'  # Duration
        - '&7--------------------------'
        - ''
        - '&bStatus: {buff_status}' # Unlock status: Available/Locked
        - '&e[Left Click] &6Purchase'
    actions:
      left:
        - 'command: kg buff {buff_keyname}' # Buff purchase command
        - 'sound: entity.experience_orb.pickup' # Example: supports playing sounds
        - 'close'

  "B":
    display:
      material: RED_STAINED_GLASS_PANE
      name: '&cBack to Main Menu'
    actions:
      left:
        - 'open: main_menu'

  "<":
    display:
      material: PAPER
      name: '&aPrevious Page'
      lore:
        - '&7Page {page} / {total_pages}'
        - '&eClick to turn page'
    actions:
      left:
        - 'PAGE_PREV'

  ">":
    display:
      material: PAPER
      name: '&aNext Page'
      lore:
        - '&7Page {page} / {total_pages}'
        - '&eClick to turn page'
    actions:
      left:
        - 'PAGE_NEXT'
