title: "&0Guild Daily Tasks"  # Title (supports colors)

Layout:   # Menu layout (6 rows)
  - '#########'
  - '111111111'
  - '111111111'
  - '111111111'
  - '111111111'
  - 'B######<>'

button:
  "#":
    display:
      material: GRAY_STAINED_GLASS_PANE
      name: ' '

  "1":
    type: 'TASK_DAILY'
    display:
      material: {task_item}
      name: '&a{task_name} ' # Task name
      lore:
        - '&7--------------------------'
        - '&7{task_lore}'   # Task description
        - '&7--------------------------'
        - '&eProgress: {task_progress}/{task_amount}'
        - '&bStatus: {task_status}'

  "B":
    display:
      material: RED_STAINED_GLASS_PANE
      name: '&cBack to Main Menu'
    actions:
      left:
        - 'open: main_menu'

  "<":
    display:
      material: PAPER
      name: '&aPrevious Page'
      lore:
        - '&7Page {page} / {total_pages}'
        - '&eClick to turn page'
    actions:
      left:
        - 'PAGE_PREV'

  ">":
    display:
      material: PAPER
      name: '&aNext Page'
      lore:
        - '&7Page {page} / {total_pages}'
        - '&eClick to turn page'
    actions:
      left:
        - 'PAGE_NEXT'
