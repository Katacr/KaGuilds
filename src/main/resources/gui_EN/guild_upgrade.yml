title: "&0Guild Upgrade"

Layout:
  - '#########'
  - ''
  - '  11111  '
  - ''
  - 'B########'

button:
  "#":
    display:
      material: GRAY_STAINED_GLASS_PANE
      name: ' '
  "1":
    type: 'GUILD_UPGRADE'
    display:
      name: '&6&lLevel Lv.{upgrade_level}'
      lore:
        - '&7Has following attributes: '
        - '&eMember Limit: &6{upgrade_max_members} players'
        - '&eMoney Limit: &6{upgrade_max_money} coins'
        - '&eVault Limit: &6{upgrade_max_vaults} vaults'
        - '&eTeleport Cost: &6{upgrade_tp_money} coins/usage'
        - '&eBank Interest: &6{upgrade_bank-interest}%/day'
        - '&eAvailable BUFFs: &6{upgrade_use_buff} buffs'
        - ''
        - '&aRequired EXP: &a{upgrade_current_exp} &7/ &2{upgrade_need_exp}'
        - '&fStatus: {upgrade_status}' # Status has 3 types: already reached this level, click to upgrade to this level, need to upgrade previous level first
    actions:
      left:
        - 'command: kg upgrade'
        - 'close'
  "B":
    display:
      material: RED_STAINED_GLASS_PANE
      name: '&cBack to Main Menu'
    actions:
      left:
        - 'open: main_menu'
