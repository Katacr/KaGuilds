title: "&0Guild Member List"  # Title (supports colors)

Layout:   # Menu layout (6 rows)
  - '#########'
  - '111111111'
  - '111111111'
  - '111111111'
  - '111111111'
  - 'B######<>'

button:
  "#":
    display:
      material: GRAY_STAINED_GLASS_PANE
      name: ' '

  "1":
    type: 'MEMBERS_LIST'
    display:
      material: {members_head} # Member head
      name: '&a{members_name} ' # Member name
      lore:
        - '&7--------------------------'
        - '&bGuild Role: &f{members_role}'  # Member role
        - '&bContribution: &f{members_contribution}'
        - '&bJoin Time: &f{members_join_time}'  # Member join time
        - '&7--------------------------'
        - ''
        - '&e[Left Click] &6Teleport to this player'
    actions:
      left:
        - 'command: teleport {members_name}'
        - 'sound: entity.experience_orb.pickup' # Example: supports playing sounds
        - 'close'

  "B":
    display:
      material: RED_STAINED_GLASS_PANE
      name: '&cBack to Main Menu'
    actions:
      left:
        - 'open: main_menu'

  "<":
    display:
      material: PAPER
      name: '&aPrevious Page'
      lore:
        - '&7Page {page} / {total_pages}'
        - '&eClick to turn page'
    actions:
      left:
        - 'PAGE_PREV'

  ">":
    display:
      material: PAPER
      name: '&aNext Page'
      lore:
        - '&7Page {page} / {total_pages}'
        - '&eClick to turn page'
    actions:
      left:
        - 'PAGE_NEXT'
